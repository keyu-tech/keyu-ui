name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Check whether package.json version is new
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on npm — skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is new — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - run: pnpm typecheck
        if: steps.check.outputs.should_publish == 'true'

      - run: pnpm build
        if: steps.check.outputs.should_publish == 'true'

      - run: pnpm registry
        if: steps.check.outputs.should_publish == 'true'

      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.should_publish }}" = "true" ]; then
            echo "Published ${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No version bump (${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }} already exists). Bump \`package.json\` \`version\` to publish." >> "$GITHUB_STEP_SUMMARY"
          fi
