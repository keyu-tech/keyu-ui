name: Deploy Keyu UI docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble _site
        run: |
          mkdir -p _site
          # docs site is the Pages entry point
          cp "Keyu UI Docs.html"        _site/index.html
          cp "Keyu Design System.html"  _site/design-system.html
          cp "Keyu Landing.html"        _site/landing.html
          cp tokens.css shadcn.css      _site/
          cp -R assets                  _site/assets
          cp -R keyu-ui                 _site/keyu-ui
          # fix the cross-link in the docs header
          sed -i 's|Keyu Design System.html|design-system.html|g' _site/index.html
          sed -i 's|Keyu Landing.html|landing.html|g'             _site/index.html _site/design-system.html
          # disable Jekyll so underscored paths ship as-is
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
