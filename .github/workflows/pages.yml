name: Deploy Keyu UI docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm registry

      - name: Assemble _site
        run: |
          mkdir -p _site
          # index.html is the library docs (Pages entry point)
          cp index.html           _site/index.html
          cp design-system.html   _site/design-system.html
          cp tokens.css base.css shadcn.css registry.json _site/
          cp -R r                 _site/r
          cp -R assets            _site/assets
          cp -R keyu-ui           _site/keyu-ui
          cp -R dist              _site/dist
          # disable Jekyll so underscored paths ship as-is
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
